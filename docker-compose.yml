services:

  postgres:
    image: postgres:16-alpine
    container_name: ngula-postgres
    environment:
      POSTGRES_DB: ngula_analytics
      POSTGRES_USER: ngula
      POSTGRES_PASSWORD: NgulaDb2025!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngula -d ngula_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ngula-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Database=ngula_analytics;Username=ngula;Password=NgulaDb2025!
      Jwt__Key: NgulaAnalyticsSuperSecretKey2025!
      Jwt__Issuer: NgulaAnalytics
      Jwt__Audience: NgulaAnalytics
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data: